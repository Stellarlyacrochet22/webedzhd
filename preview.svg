<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.4"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>
  <rect x="80" y="520" width="1120" height="1" fill="#334155" opacity="0.5"/>
  <!-- Shield icon -->
  <g transform="translate(980, 180)" filter="url(#glow)">
    <path d="M60 10 L110 30 L110 80 C110 120 60 150 60 150 C60 150 10 120 10 80 L10 30 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="60" cy="75" r="18" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <path d="M52 75 Q60 65 68 75" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <line x1="60" y1="75" x2="60" y2="90" stroke="#06b6d4" stroke-width="2"/>
  </g>
  <text x="80" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="url(#title)">HWID Spoofer</text>
  <text x="80" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#94a3b8">Hardware ID Changer for Windows 10 / 11</text>
  <text x="80" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">Disk · SMBIOS · MAC · Registry · Volume Serial</text>
  <rect x="80" y="440" width="180" height="36" rx="6" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="170" y="463" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#22d3ee">Windows x64</text>
  <rect x="280" y="440" width="140" height="36" rx="6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="350" y="463" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#a78bfa">Open Source</text>
  <text x="80" y="580" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">github.com/your-username/hwid-spoofer</text>
</svg>
